services:
  db:
    image: postgres:latest
    restart: always
    environment:
      - POSTGRES_USER=mangatra # change me
      - POSTGRES_PASSWORD=fucktmsl69420 # change me
    ports:
      - "5432:5432"
    container_name: db

  api:
    build:
      context: ../
      dockerfile: deployment/Dockerfile
    # run db migration and start the API
    command: bash -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8080"
    environment:
      - DATABASE_URI=postgresql://mangatra:fucktmsl69420@db/postgres  # change me
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always
    container_name: api